<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>MAJEL</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- 時刻 + 天気 -->
    <div class="top-bar">
      <div class="clock" id="clock">--:--:--</div>
      <div class="weather">
        <span class="weather-icon" id="weather-icon">--</span>
        <span class="weather-temp" id="weather-temp">--°C</span>
      </div>
    </div>

    <!-- CO2 + ミニグラフ -->
    <div class="middle">
      <div>
        <div class="co2-label">CO₂</div>
        <div class="co2-value" id="co2-value">-- ppm</div>
      </div>
      <div class="co2-graph" id="co2-graph"></div>
    </div>

    <!-- 直近の応答 -->
    <div class="response" id="response"></div>

    <!-- ステータスバー -->
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label" id="status-label">起動中...</span>
      <button class="mic-button" id="mic-button" title="音声入力">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- テキスト入力（トグル式） -->
  <button class="input-toggle" id="input-toggle" title="テキスト入力">⌨</button>
  <div class="input-panel" id="input-panel">
    <form class="input-area" id="ask-form">
      <input type="text" id="message" placeholder="メッセージを入力..." autocomplete="off">
      <button type="submit">送信</button>
    </form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
