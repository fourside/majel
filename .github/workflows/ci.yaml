name: CI App

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"

jobs:
  app:
    name: App (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Test
        run: deno test --allow-read --allow-env src/ static/lib/
