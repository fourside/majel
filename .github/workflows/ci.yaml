name: CI

on:
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: denoland/setup-deno@909cc5acb0fdd60627fb858598e82b6a44a7c5b1 # v2.1.1
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Test
        run: deno test --allow-read --allow-env src/ static/lib/

  sensors:
    name: Sensors (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensors
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@6b9c6063abd6010835c3cc1e4a2a44b933790cac # v5.3.1

      - name: Ruff format check
        run: uvx ruff format --check .

      - name: Ruff lint
        run: uvx ruff check --output-format github .

      - name: Type check
        run: uvx ty check --python-version 3.12 --output-format github .
