name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "sensors/**"

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/fourside/majel-app
  SENSORS_IMAGE: ghcr.io/fourside/majel-sensors

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./app
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ github.sha }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sensors
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./sensors
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.SENSORS_IMAGE }}:${{ github.sha }}
            ${{ env.SENSORS_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kustomization image tags
        run: |
          cd k8s/overlays/prod
          sed -i "s|newTag: .*|newTag: \"${{ github.sha }}\"|g" kustomization.yaml

      - name: Create PR for manifest changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="ci/update-image-tags-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update image tags to ${{ github.sha }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update image tags to ${{ github.sha }}" \
            --body "Automated image tag update from CI build." \
            --head "$BRANCH" \
            --base main
          gh pr merge "$BRANCH" --squash --delete-branch
