name: CI Sensors

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sensors: ${{ steps.filter.outputs.sensors }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sensors:
              - 'sensors/**'

  sensors:
    name: Sensors (Python)
    needs: changes
    if: needs.changes.outputs.sensors == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensors
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Ruff format check
        run: uvx ruff format --check .

      - name: Ruff lint
        run: uvx ruff check --output-format github .

      - name: Type check
        run: uvx ty check --python-version 3.12 --output-format github .
