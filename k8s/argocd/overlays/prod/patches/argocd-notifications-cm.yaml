apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  service.webhook.slack_webhook: |
    url: $slack-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  template.app-deployed: |
    webhook:
      slack_webhook:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#18be52",
              "title": "✅ {{.app.metadata.name}} deployed",
              "fields": [
                { "title": "Sync Status", "value": "{{.app.status.sync.status}}", "short": true },
                { "title": "Revision", "value": "{{.app.status.sync.revision | substr 0 7 }}", "short": true }
              ]
            }]
          }

  template.app-sync-failed: |
    webhook:
      slack_webhook:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#E96D76",
              "title": "❌ {{.app.metadata.name}} sync failed",
              "fields": [
                { "title": "Sync Status", "value": "{{.app.status.sync.status}}", "short": true },
                { "title": "Message", "value": "{{.app.status.operationState.message}}", "short": false }
              ]
            }]
          }

  template.app-health-degraded: |
    webhook:
      slack_webhook:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#f4c030",
              "title": "⚠️ {{.app.metadata.name}} health degraded",
              "fields": [
                { "title": "Health", "value": "{{.app.status.health.status}}", "short": true }
              ]
            }]
          }

  trigger.on-deployed: |
    - description: Application is synced and healthy
      oncePer: app.status.operationState.syncResult.revision
      send: [app-deployed]
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'

  trigger.on-sync-failed: |
    - description: Application sync has failed
      send: [app-sync-failed]
      when: app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-health-degraded: |
    - description: Application health is degraded
      send: [app-health-degraded]
      when: app.status.health.status == 'Degraded'
