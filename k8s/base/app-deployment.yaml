apiVersion: apps/v1
kind: Deployment
metadata:
  name: majel
  namespace: majel
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: majel
  template:
    metadata:
      labels:
        app: majel
    spec:
      securityContext:
        supplementalGroups: [29]  # audio group — needed for aplay in app container
      containers:
        - name: app
          image: ghcr.io/fourside/majel-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: majel-secrets
                  key: openai-api-key
          envFrom:
            - configMapRef:
                name: majel-config
          volumeMounts:
            - name: shared
              mountPath: /tmp/majel
            - name: snd
              mountPath: /dev/snd
            - name: asound
              mountPath: /proc/asound
              readOnly: true
            - name: backlight
              mountPath: /sys/class/backlight
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1993
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        - name: sensors
          image: ghcr.io/fourside/majel-sensors:latest
          volumeMounts:
            - name: shared
              mountPath: /tmp/majel
            - name: i2c
              mountPath: /dev/i2c-1
            - name: snd
              mountPath: /dev/snd
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            privileged: true

      volumes:
        - name: shared
          emptyDir: {}
        - name: snd
          hostPath:
            path: /dev/snd
            type: Directory
        - name: i2c
          hostPath:
            path: /dev/i2c-1
            type: CharDevice
        - name: asound
          hostPath:
            path: /proc/asound
            type: Directory
        - name: backlight
          hostPath:
            path: /sys/class/backlight
            type: Directory
