apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.120.0
          args: ["--config=/etc/otel/config.yaml"]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GRAFANA_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: majel-secrets
                  key: grafana-otlp-endpoint
            - name: GRAFANA_OTLP_AUTH
              valueFrom:
                secretKeyRef:
                  name: majel-secrets
                  key: grafana-otlp-auth
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: hostfs
          hostPath:
            path: /
      tolerations:
        - operator: Exists
